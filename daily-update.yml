name: Daily Policy Update & Deploy (RSS)

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run RSS policy crawler
        run: node rss-crawler.js
        env:
          NODE_ENV: production

      - name: Commit and push policy updates to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"
          git add policies.json package.json rss-crawler.js .github/workflows/daily-update.yml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update policies via RSS: $(date -u)"
          git push